name: Build Microsoft Store MSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: Four-part package version, higher than the previous Store submission
        required: true
        default: 0.1.0.0
        type: string
      identity_name:
        description: Exact package Identity Name from Partner Center
        required: true
        type: string
      publisher:
        description: Exact Publisher value from Partner Center, including CN=
        required: true
        type: string
      publisher_display_name:
        description: Exact Publisher Display Name from Partner Center
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: store-msix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-store-package:
    name: Build validated x64 MSIX
    runs-on: windows-2025
    timeout-minutes: 40
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen
      MSIX_VERSION: ${{ inputs.version }}
      MSIX_IDENTITY_NAME: ${{ inputs.identity_name }}
      MSIX_PUBLISHER: ${{ inputs.publisher }}
      MSIX_PUBLISHER_DISPLAY_NAME: ${{ inputs.publisher_display_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Build and validate Store package
        shell: pwsh
        run: |
          .\scripts\build-msix.ps1 `
            -IdentityName $env:MSIX_IDENTITY_NAME `
            -Publisher $env:MSIX_PUBLISHER `
            -PublisherDisplayName $env:MSIX_PUBLISHER_DISPLAY_NAME `
            -Version $env:MSIX_VERSION

      - name: Record package checksum
        id: package
        shell: pwsh
        run: |
          $Packages = @(Get-ChildItem -LiteralPath .\dist\msix -Filter *.msix)
          if ($Packages.Count -ne 1) {
              throw "Expected one MSIX package, found $($Packages.Count)."
          }
          $Package = $Packages[0]
          $Hash = Get-FileHash -LiteralPath $Package.FullName -Algorithm SHA256
          "$($Hash.Hash)  $($Package.Name)" | Set-Content -LiteralPath .\dist\msix\SHA256SUMS.txt
          "### Microsoft Store package" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Package: ``$($Package.Name)``" >> $env:GITHUB_STEP_SUMMARY
          "- SHA-256: ``$($Hash.Hash)``" >> $env:GITHUB_STEP_SUMMARY
          "- Signing: unsigned; upload to Partner Center for Microsoft Store signing" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Store submission bundle
        uses: actions/upload-artifact@v7
        with:
          name: DiskWiseAI-Store-${{ inputs.version }}
          path: |
            dist/msix/*.msix
            dist/msix/SHA256SUMS.txt
            app/docs/store-listing.md
            app/docs/privacy-policy.md
            app/docs/store-certification-notes.md
            app/docs/store-submission-checklist.md
            packaging/store/screenshots/*.png
            packaging/msix/Assets/StoreListingLogo.png
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
